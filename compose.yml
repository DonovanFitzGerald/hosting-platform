services:
    traefik:
        image: traefik:v3.6.1
        container_name: traefik
        restart: unless-stopped
        command:
            - --configFile=/etc/traefik/traefik.yml
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
        networks:
            - proxy
            - monitoring
        labels:
            - traefik.enable=true
            - traefik.docker.network=${PROXY_NETWORK}
            - traefik.http.routers.traefik.rule=Host(`${TRAEFIK_DOMAIN}`)
            - traefik.http.routers.traefik.entrypoints=websecure
            - traefik.http.routers.traefik.tls=true
            - traefik.http.routers.traefik.service=api@internal

    grafana:
        image: grafana/grafana:12.4.2
        container_name: grafana
        restart: unless-stopped
        environment:
            GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
            GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
            GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL}
        volumes:
            - grafana_data:/var/lib/grafana
        networks:
            - monitoring
            - proxy
        labels:
            - traefik.enable=true
            - traefik.docker.network=${PROXY_NETWORK}
            - traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)
            - traefik.http.routers.grafana.entrypoints=websecure
            - traefik.http.routers.grafana.tls=true
            - traefik.http.services.grafana.loadbalancer.server.port=3000

    prometheus:
        image: prom/prometheus:v3.11.0
        container_name: prometheus
        restart: unless-stopped
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - ./prometheus/blackbox-targets-static.yml:/etc/prometheus/blackbox-targets-static.yml:ro
            - prometheus_data:/prometheus
        networks:
            - monitoring

    loki:
        image: grafana/loki:3.7.1
        container_name: loki
        restart: unless-stopped
        command: -config.file=/etc/loki/config.yml
        volumes:
            - ./loki/config.yml:/etc/loki/config.yml:ro
            - loki_data:/loki
        networks:
            - monitoring

    alloy:
        image: grafana/alloy:v1.12.1
        container_name: alloy
        restart: unless-stopped
        command:
            - run
            - /etc/alloy/config.alloy
            - --server.http.listen-addr=0.0.0.0:12345
        volumes:
            - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
            - /var/lib/docker/containers:/var/lib/docker/containers:ro
        networks:
            - monitoring

    node-exporter:
        image: prom/node-exporter:v1.11.0
        container_name: node-exporter
        restart: unless-stopped
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro,rslave
        networks:
            - monitoring

    cadvisor:
        image: ghcr.io/google/cadvisor:0.56.2
        container_name: cadvisor
        restart: unless-stopped
        privileged: true
        devices:
            - /dev/kmsg:/dev/kmsg
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
            - /dev/disk:/dev/disk:ro
            - /var/run/docker.sock:/var/run/docker.sock:ro
        command:
            - --docker_only=true
        ports:
            - "8080:8080"
        networks:
            - monitoring

    blackbox-exporter:
        image: prom/blackbox-exporter:v0.28.0
        container_name: blackbox-exporter
        restart: unless-stopped
        networks:
            - monitoring

    redis:
        image: redis:8.6.0-alpine
        container_name: redis
        restart: unless-stopped
        command: >
            redis-server
            --appendonly no
            --save ""
        volumes:
            - redis_data:/data
        networks:
            - redis

    redis-exporter:
        image: oliver006/redis_exporter:v1.82.0
        container_name: redis-exporter
        restart: unless-stopped
        environment:
            REDIS_ADDR: redis://redis:6379
        depends_on:
            - redis
        networks:
            - redis
            - monitoring

volumes:
    grafana_data:
    prometheus_data:
    loki_data:
    redis_data:

networks:
    proxy:
        name: ${PROXY_NETWORK}
        external: true
    redis:
        name: ${REDIS_NETWORK}
        external: true
    monitoring:
        name: ${MONITORING_NETWORK}
        external: true
